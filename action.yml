name: install spaces
author: Tyler Gilbert
description: Prebuilt binaries of https://github.com/work-spaces/spaces
branding:
  icon: activity
  color: purple

runs:
  using: composite
  steps:
    - id: configure
      run: |
        if [[ "${{ runner.os }}" == "macOS" ]]; then
          echo platform=macos-x86_64 >> $GITHUB_OUTPUT
        elif [[ "${{ runner.os }}" == "Windows" ]]; then
          echo platform=windows-x86_64 >> $GITHUB_OUTPUT
        elif [[ "${{ runner.arch }}" == "ARM64" ]]; then
          echo platform=linux-aarch64 >> $GITHUB_OUTPUT
        else
          echo platform=linux-x86_64 >> $GITHUB_OUTPUT
        fi
        echo version=v0.15.36 >> $GITHUB_OUTPUT
      shell: bash

    - run: mkdir -p "${{runner.tool_cache}}/install-spaces/bin"
      shell: bash

    - run: |
        curl https://github.com/work-spaces/spaces/releases/download/${{steps.configure.outputs.version}}/spaces-${{steps.configure.outputs.platform}}-${{steps.configure.outputs.version}}.zip \
        --header "authorization: Bearer ${{ github.token }}" \
        --location --silent --show-error --fail --retry 5 > "${{runner.tool_cache}}/install-spaces/spaces.zip"
      shell: bash

    - run: unzip "${{runner.tool_cache}}/install-spaces/spaces.zip" -d "${{runner.tool_cache}}/install-spaces/bin"
      shell: bash

    - run: echo "${{runner.tool_cache}}/install-spaces/bin" >> $GITHUB_PATH
      shell: bash

    - run: spaces --version
      shell: bash
