name: CI

on:
  push:
  workflow_dispatch:
  schedule: [cron: "40 1 * * *"]

permissions:
  contents: read

jobs:
  install:
    name: Install spaces on ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
        fail-fast: false
        matrix:
            os: [ macos-latest, windows-latest, ubuntu-latest, ubuntu-24.04-arm ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: test that spaces is not preinstalled
        run: |
          if spaces --version; then which spaces; exit 1; fi
        shell: bash
      - name: install spaces
        uses: ./
      - run: spaces --version

  ci:
    name: CI
    if: always()
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.install.result }}" != "success" ]]; then
            echo "install job failed or was cancelled"
            exit 1
          fi